services:
  db:
    image: postgres:15
    container_name: acpec_fuel_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:17.0
    container_name: acpec_fuel_odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=odoo
      - DB_PASSWORD=odoo
    volumes:
      - ./acpec_fuel_request:/mnt/extra-addons/acpec_fuel_request
      - odoo_web_data:/var/lib/odoo
    restart: unless-stopped

volumes:
  odoo_db_data:
  odoo_web_data:
